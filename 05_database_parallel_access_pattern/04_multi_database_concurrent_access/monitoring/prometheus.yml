# Prometheus設定ファイル
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  # - "first_rules.yml"
  # - "second_rules.yml"

scrape_configs:
  # Prometheusサーバー自体の監視
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # マルチデータベースアプリケーションの監視
  - job_name: 'multi-db-app'
    static_configs:
      - targets: ['app:8081']
    metrics_path: '/metrics'
    scrape_interval: 5s
    scrape_timeout: 5s

  # PostgreSQLエクスポーターの監視（オプション）
  - job_name: 'postgres-exporter'
    static_configs:
      - targets: ['postgres-exporter:9187']
    scrape_interval: 15s

  # MySQLエクスポーターの監視（オプション）
  - job_name: 'mysql-exporter'
    static_configs:
      - targets: ['mysql-exporter:9104']
    scrape_interval: 15s


  # ノードエクスポーターの監視（システムメトリクス）
  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']
    scrape_interval: 15s

# アラートルール
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

