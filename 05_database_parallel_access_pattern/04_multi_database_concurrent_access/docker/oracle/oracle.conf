# Oracle Database 21c XE 設定ファイル

# データベース基本設定
db_name='XE'
db_unique_name='XE'
instance_name='XE'

# メモリ設定（パフォーマンス最適化）
memory_target=2G
memory_max_target=2G
sga_target=1536M
pga_aggregate_target=512M

# プロセス設定
processes=300
sessions=335

# ネットワーク設定
dispatchers='(PROTOCOL=TCP) (SERVICE=XEXDB)'
local_listener='LISTENER_XE'

# ログ設定
log_archive_dest_1='LOCATION=/opt/oracle/oradata/XE/archivelog'
log_archive_format='%t_%s_%r.arc'
log_archive_max_processes=4

# パフォーマンス設定
db_cache_size=1024M
shared_pool_size=384M
large_pool_size=64M
java_pool_size=64M
streams_pool_size=32M

# セキュリティ設定
audit_file_dest='/opt/oracle/admin/XE/adump'
audit_trail=db
remote_login_passwordfile=exclusive

# パラレル処理設定
parallel_max_servers=20
parallel_min_servers=4
parallel_adaptive_multi_user=true

# 並行接続最適化
open_cursors=300
session_cached_cursors=50

# タイムゾーン設定
db_timezone='UTC'

# 文字セット設定
nls_characterset='AL32UTF8'
nls_nchar_characterset='AL16UTF16'

# redo log設定
log_buffer=8388608

# チェックポイント設定
fast_start_mttr_target=300

# undo設定
undo_management=auto
undo_retention=900

# 統計設定
statistics_level=typical
