# PostgreSQL設定ファイル（高性能・並行処理最適化）

# 基本設定
listen_addresses = '*'
port = 5432
max_connections = 200
superuser_reserved_connections = 3

# メモリ設定
shared_buffers = 256MB              # 利用可能メモリの25%程度
effective_cache_size = 1GB          # システム全体のキャッシュサイズ
work_mem = 4MB                      # ソート・ハッシュ操作用メモリ
maintenance_work_mem = 64MB         # メンテナンス操作用メモリ
temp_buffers = 8MB                  # 一時バッファサイズ

# WAL（Write-Ahead Logging）設定
wal_level = replica                 # レプリケーション対応
wal_buffers = 16MB                  # WALバッファサイズ
max_wal_size = 2GB                  # WALセグメント最大サイズ
min_wal_size = 512MB                # WALセグメント最小サイズ
checkpoint_completion_target = 0.9   # チェックポイント完了目標
checkpoint_timeout = 10min          # チェックポイント間隔

# 並行処理設定
max_worker_processes = 8            # 最大ワーカープロセス数
max_parallel_workers = 4            # 最大並列ワーカー数
max_parallel_workers_per_gather = 2 # Gather毎の最大並列ワーカー数
max_parallel_maintenance_workers = 2 # メンテナンス用並列ワーカー数

# 接続・認証設定
authentication_timeout = 10s
ssl = off                           # 開発環境用（本番ではon）
password_encryption = scram-sha-256

# ログ設定
logging_collector = on
log_destination = 'stderr'
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_file_mode = 0600
log_rotation_age = 1d
log_rotation_size = 100MB
log_min_duration_statement = 1000   # 1秒以上のクエリをログ
log_line_prefix = '%t [%p]: [%l-1] user=%u,db=%d,app=%a,client=%h '
log_statement = 'mod'               # DDL/DMLステートメントをログ
log_lock_waits = on                 # ロック待機をログ
log_temp_files = 10MB               # 一時ファイル使用をログ

# パフォーマンス監視
track_activities = on
track_counts = on
track_io_timing = on
track_functions = all
stats_temp_directory = 'pg_stat_tmp'

# 統計情報設定
default_statistics_target = 100     # 統計サンプル数
constraint_exclusion = partition    # パーティション最適化

# プランナー設定
random_page_cost = 1.1              # SSD用に低く設定
effective_io_concurrency = 200      # SSD用に高く設定
seq_page_cost = 1.0

# 自動バキューム設定
autovacuum = on
autovacuum_max_workers = 3
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_analyze_threshold = 50
autovacuum_vacuum_scale_factor = 0.1
autovacuum_analyze_scale_factor = 0.05
autovacuum_vacuum_cost_delay = 10ms
autovacuum_vacuum_cost_limit = 200

# インデックス設定
maintenance_work_mem = 256MB        # インデックス作成用

# 日本語対応
timezone = 'Asia/Tokyo'
datestyle = 'iso, mdy'
lc_messages = 'en_US.utf8'
lc_monetary = 'en_US.utf8'
lc_numeric = 'en_US.utf8'
lc_time = 'en_US.utf8'
default_text_search_config = 'pg_catalog.english'

# 拡張機能
shared_preload_libraries = 'pg_stat_statements'

# pg_stat_statements設定
pg_stat_statements.max = 10000
pg_stat_statements.track = all
pg_stat_statements.track_utility = off
pg_stat_statements.save = on

# カスタムパラメータ（高負荷対応）
max_locks_per_transaction = 256     # トランザクション毎の最大ロック数
max_pred_locks_per_transaction = 256 # 述語ロック数
deadlock_timeout = 1s               # デッドロック検出タイムアウト

# ホット・スタンバイ設定（レプリケーション用）
hot_standby = on
hot_standby_feedback = on
max_standby_streaming_delay = 30s
wal_receiver_timeout = 60s

# アーカイブ設定
archive_mode = on
archive_command = 'test ! -f /var/lib/postgresql/archive/%f && cp %p /var/lib/postgresql/archive/%f'
archive_timeout = 300s

# レプリケーション設定
max_wal_senders = 3
wal_keep_segments = 32
synchronous_commit = on

# セキュリティ設定
row_security = on
log_connections = on
log_disconnections = on
log_hostname = off

# その他のパフォーマンス調整
tcp_keepalives_idle = 600
tcp_keepalives_interval = 30
tcp_keepalives_count = 3

# 大量データ処理用設定
max_prepared_transactions = 100
vacuum_cost_delay = 0
vacuum_cost_page_hit = 1
vacuum_cost_page_miss = 10
vacuum_cost_page_dirty = 20
vacuum_cost_limit = 200

# JIT設定（PostgreSQL 11以降）
jit = on
jit_above_cost = 100000
jit_inline_above_cost = 500000
jit_optimize_above_cost = 500000
